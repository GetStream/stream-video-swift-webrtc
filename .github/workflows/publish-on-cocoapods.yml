name: "Publish on Cocoapods"

# Promotes an existing stream-video-swift-webrtc GitHub release to CocoaPods.
# Use this after a pre-release has been validated through SPM. It extracts the version from the
# release URL, verifies the podspec version, and publishes only CocoaPods.
# No xcframework build, signing, GitHub release creation, or Package.swift update happens here.

on:
  workflow_dispatch:
    inputs:
      release_url:
        description: "Existing stream-video-swift-webrtc release URL to publish to CocoaPods"
        required: true
      use_dispatch_branch:
        description: "Run from the selected workflow branch and restore only the release tag podspec"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  release:
    name: Publish Pods Version
    runs-on: macos-26
    steps:
      - name: Connect Bot
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.BOT_SSH_PRIVATE_KEY }}

      - name: Resolve release version
        id: resolve_release
        env:
          RELEASE_URL: ${{ inputs.release_url }}
        run: |
          ruby <<'RUBY'
          require 'uri'

          uri = URI.parse(ENV.fetch('RELEASE_URL'))
          release_path = '/GetStream/stream-video-swift-webrtc/releases/tag/'
          unless uri.scheme == 'https' && uri.host == 'github.com' && uri.path.start_with?(release_path)
            abort('Release URL must be under https://github.com/GetStream/stream-video-swift-webrtc/releases/tag/')
          end

          version = uri.path.delete_prefix(release_path).chomp('/')
          abort('Release URL must include a version tag') if version.empty? || version.include?('/')

          File.open(ENV.fetch('GITHUB_OUTPUT'), 'a') do |file|
            file.puts("version=#{version}")
          end
          RUBY

      - uses: actions/checkout@v4.1.1
        with:
          fetch-depth: 0
          # By default, publish from the exact release tag. For release recovery, use the
          # selected dispatch branch so workflow/Fastfile fixes can run against an existing tag.
          ref: ${{ inputs.use_dispatch_branch && github.ref || steps.resolve_release.outputs.version }}

      - name: Restore release podspec
        if: ${{ inputs.use_dispatch_branch }}
        env:
          VERSION: ${{ steps.resolve_release.outputs.version }}
        run: |
          # Keep the workflow and Fastfile from the selected dispatch branch, but publish the
          # podspec that belongs to the immutable release tag.
          git fetch --force --depth=1 origin "refs/tags/${VERSION}:refs/tags/${VERSION}"
          git show "${VERSION}:StreamWebRTC.podspec" > StreamWebRTC.podspec

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2
          bundler-cache: true

      - name: "Fastlane - Publish Pods"
        env:
          GITHUB_TOKEN: ${{ secrets.CI_BOT_GITHUB_TOKEN }}
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          APPSTORE_API_KEY: ${{ secrets.APPSTORE_API_KEY }}
        run: bundle exec fastlane release_cocoapods version:"${{ steps.resolve_release.outputs.version }}" --verbose
        timeout-minutes: 20

      - uses: 8398a7/action-slack@v3
        if: failure()
        with:
          status: ${{ job.status }}
          text: |
            ❌ StreamVideoWebRTC CocoaPods release failed! 🚢

            Flow: Publish on Cocoapods
            Version: ${{ steps.resolve_release.outputs.version }}
            Release URL: ${{ inputs.release_url }}

            cc: <!subteam^S05RBQ69U1H>
          fields: repo
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            🎉 StreamVideoWebRTC CocoaPods release has been shipped! 🚢

            Flow: Publish on Cocoapods
            Version: ${{ steps.resolve_release.outputs.version }}
            Release URL: ${{ inputs.release_url }}

            cc: <!subteam^S05RBQ69U1H>
          fields: repo
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
