name: "Create new release"

# Builds WebRTC from source, signs and zips both WebRTC and StreamWebRTC xcframeworks,
# bumps Package.swift and StreamWebRTC.podspec, then creates the GitHub/SPM release.
# When pre_release is false, the same run also publishes the tagged podspec to CocoaPods.
# When pre_release is true, CocoaPods is skipped so the version can be validated through SPM first.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version/tag to publish. Short WebRTC-style versions are normalized to semver, e.g. 145.1 -> 145.1.0."
        required: true
      webrtc_branch:
        description: "WebRTC branch to build the xcframework from"
        required: true
        default: "main"
      pre_release:
        description: "Mark the GitHub release as a pre-release and skip CocoaPods publishing"
        required: false
        type: boolean
        default: false

jobs:
  build:
    name: Build
    runs-on: macos-26
    steps:
      - name: Connect Bot
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.BOT_SSH_PRIVATE_KEY }}

      - uses: actions/checkout@v4.1.1

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2
          bundler-cache: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Git authentication
        run: |
          echo "This step is required to bypass `git credential-luci login`"
          git config --global credential.helper store
          echo "https://${GITHUB_ACTOR}:${{ secrets.GITHUB_TOKEN }}@github.com" > ~/.git-credentials

      - name: "Fastlane - Build"
        env:
          GITHUB_TOKEN: ${{ secrets.CI_BOT_GITHUB_TOKEN }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          APPSTORE_API_KEY: ${{ secrets.APPSTORE_API_KEY }}
        run: bundle exec fastlane build webrtc_branch:${{ inputs.webrtc_branch }} --verbose
        timeout-minutes: 120

      - uses: 8398a7/action-slack@v3
        if: failure()
        with:
          status: ${{ job.status }}
          text: |
            ❌ StreamVideoWebRTC release failed! 🚢

            Flow: Create new release
            Job: Build artifacts
            Version: ${{ inputs.version }}
            WebRTC branch: ${{ inputs.webrtc_branch }}
            Pre-release: ${{ inputs.pre_release }}

            cc: <!subteam^S05RBQ69U1H>
          fields: repo
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: StreamWebRTC.xcframework.zip
          path: fastlane/StreamWebRTC.xcframework.zip
          retention-days: 7

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: WebRTC.xcframework.zip
          path: fastlane/WebRTC.xcframework.zip
          retention-days: 7

  release:
    name: Publish new release
    runs-on: macos-26
    needs: build
    if: ${{ !cancelled() && (needs.build.result == 'success' || needs.build.result == 'skipped') }}
    steps:
      - name: Connect Bot
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.BOT_SSH_PRIVATE_KEY }}

      - uses: actions/checkout@v4.1.1
        with:
          fetch-depth: 0

      - name: Download WebRTC
        uses: actions/download-artifact@v4
        with:
          name: WebRTC.xcframework.zip
          path: fastlane/

      - name: Download StreamWebRTC
        uses: actions/download-artifact@v4
        with:
          name: StreamWebRTC.xcframework.zip
          path: fastlane/

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2
          bundler-cache: true

      - name: "Fastlane - Publish Release"
        env:
          GITHUB_TOKEN: ${{ secrets.CI_BOT_GITHUB_TOKEN }}
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          APPSTORE_API_KEY: ${{ secrets.APPSTORE_API_KEY }}
        run: bundle exec fastlane release version:"${{ inputs.version }}" pre_release:${{ inputs.pre_release }} --verbose
        timeout-minutes: 20

      - uses: 8398a7/action-slack@v3
        if: failure()
        with:
          status: ${{ job.status }}
          text: |
            ❌ StreamVideoWebRTC release failed! 🚢

            Flow: Create new release
            Job: Publish release
            Version: ${{ inputs.version }}
            WebRTC branch: ${{ inputs.webrtc_branch }}
            Pre-release: ${{ inputs.pre_release }}

            cc: <!subteam^S05RBQ69U1H>
          fields: repo
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            🎉 StreamVideoWebRTC release has been shipped! 🚢

            Flow: Create new release
            Version: ${{ inputs.version }}
            WebRTC branch: ${{ inputs.webrtc_branch }}
            Pre-release: ${{ inputs.pre_release }}

            cc: <!subteam^S05RBQ69U1H>
          fields: repo
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
